    </div>

    <div class="lib-panel movie-section ${activePanel==='movies'?'active':''}" id="moviesPanel">
      ${pillRow('Genre',buildGenrePills(),mGenre,'mg','blue')}
      ${buildTagPills(movies).length>1?pillRow('Tags',buildTagPills(movies),mTag,'mt','blue'):''}
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0">
        <div style="position:relative;flex:1;min-width:180px"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px;pointer-events:none">🔍</span><input type="text" id="mSr" placeholder="Search movies..." style="width:100%;padding:8px 14px 8px 32px;font-size:11px;background:var(--bg3);border-radius:10px" /></div>
        ${pillRow('Sort',[{id:'rating',label:'Rating'},{id:'title',label:'Title'},{id:'year',label:'Year'},{id:'tmdb',label:'TMDB'}],mSort,'ms','blue',true)}
        <div style="margin-left:auto">${viewToggles()}</div>
      </div>
      <div class="tv-glow"><div class="scroll-box-wrap"><div class="scroll-box">
        <div class="poster-grid ${viewClass()}" id="mGrid"></div>
        ${!movies.length?'<div style="text-align:center;padding:50px;color:var(--tx3);font-size:12px">No movies yet. Head to <strong>Discover</strong> to search and add some.</div>':''}
      </div></div></div>
    </div>

    <div class="lib-panel tv-section ${activePanel==='tv'?'active':''}" id="tvPanel">
      ${pillRow('Genre',buildGenrePills(),tGenre,'tg','violet')}
      ${buildTagPills(tvShows).length>1?pillRow('Tags',buildTagPills(tvShows),tTag,'tt','violet'):''}
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0">
        <div style="position:relative;flex:1;min-width:180px"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px;pointer-events:none">🔍</span><input type="text" id="tSr" placeholder="Search TV shows..." style="width:100%;padding:8px 14px 8px 32px;font-size:11px;background:var(--bg3);border-radius:10px" /></div>
        ${pillRow('Sort',[{id:'rating',label:'Rating'},{id:'title',label:'Title'},{id:'year',label:'Year'},{id:'tmdb',label:'TMDB'}],tSort,'ts','violet',true)}
        <div style="margin-left:auto">${viewToggles()}</div>
      </div>
      <div class="tv-glow"><div class="scroll-box-wrap"><div class="scroll-box">
        <div class="poster-grid ${viewClass()}" id="tGrid"></div>
        ${!tvShows.length?'<div style="text-align:center;padding:50px;color:var(--tx3);font-size:12px">No TV shows yet. Head to <strong>Discover</strong> to search and add some.</div>':''}
      </div></div></div>
    </div>`;

  // Hero click & shuffle
  let currentHero=heroEntry;
  function swapHero(){
    const heroEl=el.querySelector('.hero');if(!heroEl||!heroPool.length)return;
    const next=heroPool[Math.floor(Math.random()*heroPool.length)];
    if(next===currentHero&&heroPool.length>1)return swapHero();
    currentHero=next;
    const isM=next.media_type==='movie';const acc=isM?'blue':'violet';
    heroEl.style.opacity='0';heroEl.style.transition='opacity .4s';
    setTimeout(()=>{
      heroEl.querySelector('.hero-bg').style.backgroundImage=`url('${TMDB_IMG}w780${next.poster}')`;
      heroEl.querySelector('.hero-poster').src=`${TMDB_IMG}w300${next.poster}`;
      heroEl.querySelector('.hero-poster').alt=esc(next.title);
      heroEl.querySelector('.hero-label').style.color=`var(--${acc}-l)`;
      heroEl.querySelector('.hero-label').textContent='From Your Collection';
      heroEl.querySelector('.hero-title').textContent=next.title;
      heroEl.querySelector('.hero-meta').innerHTML=`<span class="hero-rating" style="color:var(--${acc}-l)">${next.myRating}/10</span><span>${next.year||''}</span><span>${(next.genres||[]).slice(0,3).join(', ')}</span>`;
      const tagsEl=heroEl.querySelector('.hero-tags');
      if(tagsEl){if(next.tags&&next.tags.length){tagsEl.innerHTML=next.tags.slice(0,3).map(t=>`<span style="font-size:9px;padding:3px 10px;border-radius:10px;background:var(--${acc}-g);color:var(--${acc}-l);border:1px solid rgba(${isM?'14,165,233':'167,139,250'},.15)">${esc(t)}</span>`).join('')}else{tagsEl.innerHTML=''}}
      heroEl.onclick=(e)=>{openDetail(currentHero)};
      heroEl.style.opacity='1';
    },400);
  }
  if(heroEntry){const heroEl=el.querySelector('.hero');if(heroEl)heroEl.style.cursor='pointer';
    if(heroEl)heroEl.onclick=(e)=>{openDetail(currentHero)}}
  if(heroPool.length>1){_heroInterval=setInterval(swapHero,5000)}

  // Tab switching
  $$('.lib-tab',el).forEach(tab=>{if(!tab.dataset.panel)return;tab.onclick=()=>{
    const p=tab.dataset.panel;
    S.libTab=p;
    $$('.lib-tab',el).forEach(t=>{if(t.dataset.panel)t.className='lib-tab';});
    tab.classList.add(p==='movies'?'active-movie':'active-tv');
    $$('.lib-panel').forEach(panel=>panel.classList.remove('active'));
    $(`#${p==='movies'?'moviesPanel':'tvPanel'}`).classList.add('active');
  }});

  bindViewToggles(()=>renderLibrary(el));

  function renderGrid(items,gridId,genre,tag,sort,searchId){
    let L=[...items];
    const sq=($(searchId)?.value||'').trim().toLowerCase();
    if(sq)L=L.filter(e=>e.title.toLowerCase().includes(sq)||(e.genres||[]).some(g=>g.toLowerCase().includes(sq))||(e.tags||[]).some(t=>t.toLowerCase().includes(sq))||(e.year||'').includes(sq));
    if(genre!=='all')L=L.filter(e=>(e.genres||[]).includes(genre));
    if(tag!=='all')L=L.filter(e=>(e.tags||[]).includes(tag));
    if(sort==='rating')L.sort((a,b)=>b.myRating-a.myRating);
    else if(sort==='tmdb')L.sort((a,b)=>(b.tmdbRating||0)-(a.tmdbRating||0));
    else if(sort==='title')L.sort((a,b)=>a.title.localeCompare(b.title));
    else if(sort==='year')L.sort((a,b)=>(b.year||'').localeCompare(a.year||''));
    const grid=$(gridId);grid.innerHTML=L.map((e,i)=>`
      <div class="poster-card fade-up" style="animation-delay:${Math.min(i*.04,.5)}s" data-idx="${e.id}">
        ${e.poster?`<img src="${TMDB_IMG}w342${e.poster}" alt="${esc(e.title)}" loading="lazy" />`:`<div class="no-poster">\uD83C\uDFAC</div>`}
        ${e.recommended?'<span class="rec-star">\u2B50</span>':''}
        <div class="poster-over"><h4>${esc(e.title)}</h4>
          <div class="ratings"><span class="mine">${e.myRating}/10</span>${e.tmdbRating>0?`<span class="theirs">TMDB ${e.tmdbRating.toFixed(1)}</span>`:''}</div>
          <div class="info">${e.year||''} \u00b7 ${(e.genres||[]).slice(0,3).join(', ')}</div>
          ${e.tags&&e.tags.length?`<div class="tags-row">${e.tags.slice(0,3).map(t=>`<span class="mini-tag">${esc(t)}</span>`).join('')}</div>`:''}</div>
        <div class="card-preview">
          <div class="cp-title">${esc(e.title)}</div>
          <div class="cp-meta"><span class="cp-rating">${e.myRating}/10</span>${e.tmdbRating>0?`<span style="color:var(--tx3);font-family:'JetBrains Mono',monospace;font-size:11px">\u2605 ${e.tmdbRating.toFixed(1)} TMDB</span>`:''}<span>${e.year||''}</span>${e.runtime?`<span>${e.runtime} min</span>`:''}</div>
          <div class="cp-genres">${(e.genres||[]).join(' \u00b7 ')}</div>
          ${e.overview?`<div class="cp-overview">${esc(e.overview)}</div>`:''}
          ${e.tags&&e.tags.length?`<div class="cp-tags">${e.tags.slice(0,5).map(t=>`<span class="cp-tag">${esc(t)}</span>`).join('')}</div>`:''}
        </div>
      </div>`).join('');
    $$('.poster-card',grid).forEach(c=>{c.onclick=()=>{const en=S.entries.find(e=>e.id===c.dataset.idx);if(en)openDetail(en)}});
  }

  function applyMovies(){renderGrid(movies,'#mGrid',mGenre,mTag,mSort,'#mSr')}
  function applyTV(){renderGrid(tvShows,'#tGrid',tGenre,tTag,tSort,'#tSr')}
  // Pill bindings — movies
  $$('[data-mg]').forEach(b=>b.onclick=()=>{mGenre=b.dataset.mg;S._mGenre=mGenre;renderLibrary(el)});
  $$('[data-mt]').forEach(b=>b.onclick=()=>{mTag=b.dataset.mt;S._mTag=mTag;renderLibrary(el)});
  $$('[data-ms]').forEach(b=>b.onclick=()=>{mSort=b.dataset.ms;S._mSort=mSort;renderLibrary(el)});
  $$('[data-tg]').forEach(b=>b.onclick=()=>{tGenre=b.dataset.tg;S._tGenre=tGenre;renderLibrary(el)});
  $$('[data-tt]').forEach(b=>b.onclick=()=>{tTag=b.dataset.tt;S._tTag=tTag;renderLibrary(el)});
  $$('[data-ts]').forEach(b=>b.onclick=()=>{tSort=b.dataset.ts;S._tSort=tSort;renderLibrary(el)});
  if($('#mSr'))$('#mSr').oninput=applyMovies;
  if($('#tSr'))$('#tSr').oninput=applyTV;
  if(movies.length)applyMovies();
  if(tvShows.length)applyTV();
}

// ═══ VRSCOVER (Discover) ═══
// ═══ EXPLORE PANEL (Discover detail + similar) ═══
function openExplorePanel(item,mediaType,removeCardFn,fromLibrary){
  const accent=mediaType==='movie'?'blue':'violet';
  const o=document.createElement('div');o.className='overlay';
  const genreText=(item.genres||[]).map(function(g){return typeof g==='number'?GENRES[g]:g}).filter(Boolean);
  var libEntry=fromLibrary?S.entries.find(function(e){return String(e.tmdb_id)===String(item.id)}):null;
  var ratingHtml=libEntry?'<div style="margin-bottom:16px"><span style="font-family:\'JetBrains Mono\',monospace;font-size:20px;font-weight:700;background:linear-gradient(90deg,var(--blue-l),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent">'+libEntry.myRating+'/10</span><span style="color:var(--tx3);font-size:11px;margin-left:8px">Your rating</span></div>':'';
  var actionHtml=fromLibrary?ratingHtml
    :'<div style="display:flex;gap:10px;margin-bottom:16px">'
    +'<button class="btn exp-add" style="background:var(--'+accent+');flex:1;max-width:220px">\uff0b Add to Library</button>'
    +'<button class="btn exp-watch" style="background:var(--grn);flex:1;max-width:220px">\uff0b Add to Watchlist</button>'
    +'</div>';
  o.innerHTML='<div class="explore-panel">'
    +'<button class="explore-close">\u00d7</button>'
    +'<div class="explore-inner">'
    +'<div class="explore-left">'
    +'<div style="display:flex;gap:24px;margin-bottom:24px">'
    +(item.poster?'<img src="'+TMDB_IMG+'w300'+item.poster+'" style="width:160px;height:240px;border-radius:14px;object-fit:cover;box-shadow:0 12px 40px rgba(0,0,0,.6);flex-shrink:0" />':'<div style="width:160px;height:240px;border-radius:14px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0">\uD83C\uDFAC</div>')
    +'<div style="flex:1;min-width:0">'
    +'<h2 class="grad-title" style="font-size:28px;margin-bottom:6px">'+esc(item.title)+'</h2>'
    +'<div style="color:var(--'+accent+');font-weight:500;font-size:13px;margin-bottom:10px;font-family:\'JetBrains Mono\',monospace">'+(item.year||'')+' \u00b7 \u2605 '+(item.vote||item.tmdbRating||0).toFixed(1)+'</div>'
    +'<div class="genre-pills" style="margin-bottom:12px">'+genreText.map(function(g){return'<span class="pill">'+esc(g)+'</span>'}).join('')+'</div>'
    +(item.overview?'<p style="font-size:12px;color:var(--tx2);line-height:1.7">'+esc(item.overview)+'</p>':'')
    +'</div></div>'
    +actionHtml
    +'</div>'
    +'<div class="explore-right">'
    +'<h3 class="grad-title" style="font-size:14px;margin-bottom:12px">Similar Titles</h3>'
    +'<div id="simList"><div class="sim-spinner"><div class="vr-spinner"></div>Loading similar...</div></div>'
    +'</div></div></div>';
  document.body.appendChild(o);
  // Match right panel height to left panel
  var leftEl=o.querySelector('.explore-left');
  var rightEl=o.querySelector('.explore-right');
  if(leftEl&&rightEl){
    requestAnimationFrame(function(){
      var h=leftEl.offsetHeight;
      rightEl.style.maxHeight=h+'px';
    });
  }
  o.onclick=function(ev){if(ev.target===o)o.remove()};
  o.querySelector('.explore-close').onclick=function(){o.remove()};

  // Add to library (only exists when not from library)
  var expAddBtn=o.querySelector('.exp-add');
  if(expAddBtn)expAddBtn.onclick=async function(){
    var btn=this;btn.disabled=true;btn.textContent='Loading...';
    try{
      var resp=await fetch('https://api.themoviedb.org/3/'+mediaType+'/'+item.id+'?api_key='+S.apiKey+'&append_to_response=external_ids');
      var d=await resp.json();o.remove();
      if(removeCardFn)removeCardFn(item.id);
      openAddModal(Object.assign({},d,{media_type:mediaType}));
    }catch(e){btn.textContent='Error';btn.disabled=false}
  };

  // Add to watchlist (only exists when not from library)
  var expWatchBtn=o.querySelector('.exp-watch');
  if(expWatchBtn)expWatchBtn.onclick=async function(){
    var btn=this;
    if(S.bucket.find(function(e){return String(e.tmdb_id)===String(item.id)})){toast('Already in Watchlist');return}
    if(S.entries.find(function(e){return String(e.tmdb_id)===String(item.id)})){toast('Already in library');return}
    btn.disabled=true;btn.textContent='Adding...';
    try{
      var resp=await fetch('https://api.themoviedb.org/3/'+mediaType+'/'+item.id+'?api_key='+S.apiKey+'&append_to_response=external_ids');
      var d=await resp.json();
      var t=d.title||d.name,y=(d.release_date||d.first_air_date||'').slice(0,4);
      S.bucket.push({
        id:'bucket_'+d.id+'_'+Date.now(),tmdb_id:d.id,media_type:mediaType,
        title:t,year:y,genres:(d.genres||[]).map(function(g){return g.name}),poster:d.poster_path||'',
        overview:d.overview||'',tmdbRating:d.vote_average||0,
        runtime:d.runtime||(d.episode_run_time&&d.episode_run_time[0])||0,
        seasons:d.number_of_seasons||0,episodes:d.number_of_episodes||0,
        imdbId:d.external_ids?d.external_ids.imdb_id||'':'',addedAt:new Date().toISOString()
      });ps();
      if(removeCardFn)removeCardFn(item.id);
      btn.textContent='\u2713 Added';toast('Added "'+t+'" to Watchlist');
    }catch(e){btn.textContent='Error';btn.disabled=false}
  };

  // Fetch similar titles
  (async function(){
    var simEl=o.querySelector('#simList');
    try{
      var simUrl='https://api.themoviedb.org/3/'+mediaType+'/'+item.id+'/similar?api_key='+S.apiKey+'&page=1';
      var resp=await fetch(simUrl);
      if(!resp.ok)throw new Error('HTTP '+resp.status);
      var data=await resp.json();
      if(!simEl||!o.parentNode)return;
      var results=(data.results||[]).filter(function(r){
        return !S.entries.some(function(e){return String(e.tmdb_id)===String(r.id)})
      }).slice(0,12);
      // If /similar returns nothing, try /recommendations
      if(!results.length){
        var recUrl='https://api.themoviedb.org/3/'+mediaType+'/'+item.id+'/recommendations?api_key='+S.apiKey+'&page=1';
        var resp2=await fetch(recUrl);
        if(resp2.ok){
          var data2=await resp2.json();
          results=(data2.results||[]).filter(function(r){
            return !S.entries.some(function(e){return String(e.tmdb_id)===String(r.id)})
          }).slice(0,12);
        }
      }
      if(!simEl||!o.parentNode)return;
      if(!results.length){simEl.innerHTML='<div style="text-align:center;padding:30px;color:var(--tx3);font-size:11px">No similar titles found.</div>';return}
      simEl.innerHTML=results.map(function(r){
        var t=r.title||r.name||'';
        var y=(r.release_date||r.first_air_date||'').slice(0,4);
        var p=r.poster_path?TMDB_IMG+'w92'+r.poster_path:'';
        var inLib=S.entries.some(function(e){return String(e.tmdb_id)===String(r.id)});
        var inBucket=S.bucket.some(function(e){return String(e.tmdb_id)===String(r.id)});
        var html='<div class="sim-card" data-sid="'+r.id+'">';
        html+=p?'<img class="sim-poster" src="'+p+'" alt="'+esc(t)+'" loading="lazy" />':'<div class="sim-poster" style="display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:16px">\uD83C\uDFAC</div>';
        html+='<div class="sim-info"><div class="sim-title">'+esc(t)+'</div>';
        html+='<div class="sim-meta">'+y+(r.vote_average>0?' \u00b7 \u2605 '+r.vote_average.toFixed(1):'')+'</div>';
        if(inLib){html+='<div style="font-size:9px;color:var(--'+accent+');font-weight:600">\u2713 In Library</div>'}
        else if(inBucket){html+='<div style="font-size:9px;color:var(--tx3);font-weight:600">\u2713 In Watchlist</div>'}
        else{html+='<div class="sim-actions">'
          +'<button class="sim-btn sim-add-lib" data-sid="'+r.id+'" style="background:var(--'+accent+');color:#fff">\uff0b Library</button>'
          +'<button class="sim-btn sim-add-wl" data-sid="'+r.id+'" style="background:var(--grn);color:#fff">\uff0b Watchlist</button>'
          +'</div>'}
        html+='</div></div>';
        return html;
      }).join('');

      // Click a similar card to open its own explore panel
      simEl.querySelectorAll('.sim-card').forEach(function(sc){sc.onclick=function(ev){
        if(ev.target.closest('.sim-btn'))return;
        var sid=parseInt(sc.dataset.sid);
        var sr=results.find(function(x){return x.id===sid});if(!sr)return;
        o.remove();
        openExplorePanel({
          id:sr.id,title:sr.title||sr.name||'',year:(sr.release_date||sr.first_air_date||'').slice(0,4),
          poster:sr.poster_path,overview:sr.overview||'',vote:sr.vote_average||0,
          genres:sr.genre_ids||[],media_type:mediaType
        },mediaType,removeCardFn);
      }});

      // Add to library from similar
      simEl.querySelectorAll('.sim-add-lib').forEach(function(btn){btn.onclick=async function(ev){
        ev.stopPropagation();var sid=btn.dataset.sid;btn.disabled=true;btn.textContent='...';
        try{
          var r2=await fetch('https://api.themoviedb.org/3/'+mediaType+'/'+sid+'?api_key='+S.apiKey+'&append_to_response=external_ids');
          var d=await r2.json();
          openAddModal(Object.assign({},d,{media_type:mediaType}));
          o.remove();
        }catch(e){btn.textContent='Err';btn.disabled=false}
      }});

      // Add to watchlist from similar
      simEl.querySelectorAll('.sim-add-wl').forEach(function(btn){btn.onclick=async function(ev){
        ev.stopPropagation();var sid=parseInt(btn.dataset.sid);
        if(S.bucket.some(function(e){return String(e.tmdb_id)===String(sid)})){toast('Already in Watchlist');return}
        btn.disabled=true;btn.textContent='...';
        try{
          var r2=await fetch('https://api.themoviedb.org/3/'+mediaType+'/'+sid+'?api_key='+S.apiKey+'&append_to_response=external_ids');
          var d=await r2.json();
          var t=d.title||d.name,y=(d.release_date||d.first_air_date||'').slice(0,4);
          S.bucket.push({
            id:'bucket_'+d.id+'_'+Date.now(),tmdb_id:d.id,media_type:mediaType,
            title:t,year:y,genres:(d.genres||[]).map(function(g){return g.name}),poster:d.poster_path||'',
            overview:d.overview||'',tmdbRating:d.vote_average||0,
            runtime:d.runtime||(d.episode_run_time&&d.episode_run_time[0])||0,
            seasons:d.number_of_seasons||0,episodes:d.number_of_episodes||0,
            imdbId:d.external_ids?d.external_ids.imdb_id||'':'',addedAt:new Date().toISOString()
          });ps();
          btn.textContent='\u2713';btn.style.opacity='.5';
          toast('Added "'+t+'" to Watchlist');
        }catch(e){btn.textContent='Err';btn.disabled=false}
      }});
    }catch(err){
      console.error('Similar fetch error:',err);
      if(simEl&&o.parentNode)simEl.innerHTML='<div style="text-align:center;padding:30px;color:var(--tx3);font-size:11px">Failed to load similar titles.</div>';
    }
  })();
}

function renderVRadar(el){

    <p>Add some movies and shows so Discover can learn your taste.</p>
    <button class="btn" style="max-width:240px;margin:24px auto 0" onclick="document.querySelector('[data-tab=vradar]').click()">Start Adding</button></div>`;return}

  const topGenres=Object.entries(S.entries.flatMap(e=>e.genres||[]).reduce((a,g)=>{a[g]=(a[g]||0)+1;return a},{})).sort((a,b)=>b[1]-a[1]).slice(0,5).map(g=>g[0]);
  const avgRating=(S.entries.reduce((s,e)=>s+e.myRating,0)/S.entries.length).toFixed(1);

  const moods=[
    {id:'feel-good',label:'Feel Good',icon:'😊',desc:'Uplifting & heartwarming',genres:['Comedy','Romance','Family','Animation','Music'],kw:'feel good|heartwarming|uplifting'},

    {id:'edge-seat',label:'Edge of Seat',icon:'😰',desc:'Tension & suspense',genres:['Thriller','Horror','Action','Crime','Mystery'],kw:'suspense|tension|survival'},
    {id:'epic',label:'Epic Journey',icon:'⚔️',desc:'Grand & sweeping',genres:['Adventure','Fantasy','History','War','Science Fiction'],kw:'epic|journey|quest'},
    {id:'real-stories',label:'Real Stories',icon:'📖',desc:'True & grounded',genres:['Documentary','Drama','History','TV Movie'],kw:'based on true story|biography|true story'},
    {id:'wild-ride',label:'Wild Ride',icon:'🎢',desc:'Non-stop action',genres:['Action','Adventure','Science Fiction','Crime','Thriller'],kw:'action|chase|explosion'},
    {id:'dark-gritty',label:'Dark & Gritty',icon:'🌑',desc:'Raw & intense',genres:['Crime','Drama','Thriller','Horror','Mystery','War'],kw:'dark|gritty|noir'},
    {id:'hidden-gems',label:'Hidden Gems',icon:'💎',desc:'Under the radar picks',genres:[]}
  ];

  let vrTab=S.vrTab||'movies';
  let activeMood=S.vrMood||null;
  let activeGenre=S.vrGenre||'all';
  let activeEra=S.vrEra||'all';
  let vrResults=S.vrResults||[];
  let vrLoading=false;
  let vrPage=S.vrPage||1;
  const eras=[{id:'all',label:'All'},{id:'2020',label:'2020s'},{id:'2010',label:'2010s'},{id:'2000',label:'2000s'},{id:'1990',label:'1990s'},{id:'1980',label:'1980s'},{id:'1970',label:'1970s'},{id:'1960',label:'1960s'},{id:'1950',label:'1950s'}];

  function buildUI(){
    el.innerHTML=`
    <div class="fade-up">
      <div style="margin-bottom:14px;flex-shrink:0">
        <h2 class="grad-title" style="font-size:36px">Discover</h2>
        <p style="color:var(--tx2);font-size:12px;margin-top:4px">Discover your next watch based on your taste profile</p>
      </div>

      <div class="lib-tabs" style="margin-bottom:12px;flex-shrink:0">
        <div class="lib-tabs-boxed">
          <button class="lib-tab vr-tab ${vrTab==='movies'?'active-movie':''}" data-vr="movies">
            <span class="tab-icon">🎬</span>Movies
          </button>
          <button class="lib-tab vr-tab ${vrTab==='tv'?'active-tv':''}" data-vr="tv">
            <span class="tab-icon">📺</span>TV Shows
          </button>
        </div>
      </div>

      ${pillRow('Genre',[{id:'all',label:'All'},...MAJOR_GENRES.map(g=>({id:g,label:g}))],activeGenre,'vgenre',vrTab==='movies'?'blue':'violet')}
      ${pillRow('Mood',[{id:'none',label:'All'},...moods.map(m=>({id:m.id,label:m.label,icon:m.icon}))],activeMood||'none','vmood',vrTab==='movies'?'blue':'violet')}
      ${pillRow('Era',eras,activeEra,'vera',vrTab==='movies'?'blue':'violet')}

      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0">
        <div style="position:relative;flex:2;min-width:200px">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px;pointer-events:none">&#x2315;</span>
          <input type="text" id="vrSearch" placeholder="Keywords (korean, heist...)" value="${esc(S.vrSearch||'')}"
            style="width:100%;padding:10px 16px 10px 32px;font-size:12px;background:var(--bg3);border-radius:10px" />
        </div>
        <button class="btn btn-sm" id="vrDiscover" style="background:linear-gradient(135deg,${vrTab==='movies'?'var(--blue),var(--blue-d)':'var(--violet),var(--violet-d)'})">
          Discover
        </button>
        <div style="position:relative;flex:2;min-width:200px">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--${vrTab==='movies'?'blue':'violet'});font-size:13px;pointer-events:none">\uff0b</span>
          <input type="text" id="vrAddSearch" placeholder="Search & add to library..." autocomplete="off"
            style="width:100%;padding:10px 16px 10px 32px;font-size:12px;background:var(--bg3);border-radius:10px" />
          <div id="vrAddResults" class="results" style="display:none"></div>
        </div>
        ${viewToggles()}
      </div>

      <div class="tv-glow"><div class="scroll-box-wrap">
        <div class="scroll-box" id="vrBox">
          <div id="vrResults">${vrLoading?'<div style="text-align:center;padding:60px;color:var(--tx3);font-size:12px"><div class="vr-spinner"></div>Discovering...</div>':''}</div>
          <div id="vrLoadMore" style="display:none;text-align:center;padding:20px;color:var(--tx3);font-size:11px"><div class="vr-spinner"></div>Loading more...</div>
        </div>
      </div></div>
    </div>`;

    $$('.vr-tab').forEach(t=>t.onclick=()=>{
      vrTab=t.dataset.vr;S.vrTab=vrTab;S.vrResults=[];vrResults=[];activeMood=null;S.vrMood=null;activeEra='all';S.vrEra='all';vrPage=1;S.vrPage=1;buildUI();discover();
    });
    $$('[data-vmood]').forEach(b=>b.onclick=()=>{
      const v=b.dataset.vmood;activeMood=v==='none'?null:v;S.vrMood=activeMood;
      vrPage=1;S.vrPage=1;S.vrResults=[];vrResults=[];buildUI();discover();
    });
    $$('[data-vgenre]').forEach(b=>b.onclick=()=>{activeGenre=b.dataset.vgenre;S.vrGenre=activeGenre;
      vrPage=1;S.vrPage=1;S.vrResults=[];vrResults=[];discover();buildUI()});
    $$('[data-vera]').forEach(b=>b.onclick=()=>{activeEra=b.dataset.vera;S.vrEra=activeEra;
      vrPage=1;S.vrPage=1;S.vrResults=[];vrResults=[];discover();buildUI()});
    if($('#vrSearch'))$('#vrSearch').onkeydown=(e)=>{if(e.key==='Enter'){e.preventDefault();
      S.vrSearch=$('#vrSearch').value.trim();vrPage=1;S.vrPage=1;S.vrResults=[];vrResults=[];discover()}};
    if($('#vrDiscover'))$('#vrDiscover').onclick=()=>{S.vrSearch=$('#vrSearch')?$('#vrSearch').value.trim():'';vrPage=1;S.vrPage=1;discover()};
    // Add-to-library search
    let _addSt=null;
    const addInp=$('#vrAddSearch'),addRes=$('#vrAddResults');
    if(addInp){addInp.oninput=()=>{
      clearTimeout(_addSt);const q=addInp.value.trim();
      if(q.length<2){if(addRes)addRes.style.display='none';return}
      _addSt=setTimeout(async()=>{
        const r=await tmSearch(q);if(!$('#vrAddResults'))return;
        if(!r.length){addRes.style.display='none';return}
        addRes.style.display='block';
        addRes.innerHTML=r.map(function(item){
          var t=item.title||item.name,y=(item.release_date||item.first_air_date||'').slice(0,4);
          var p=item.poster_path?TMDB_IMG+'w92'+item.poster_path:'';
          var g=(item.genre_ids||[]).slice(0,3).map(function(id){return GENRES[id]}).filter(Boolean).join(', ');
          var added=S.entries.some(function(e){return e.tmdb_id===item.id});
          var inBucket=S.bucket.some(function(e){return e.tmdb_id===item.id});
          var isMovie=item.media_type==='movie';
          var html='<div class="result-item '+(added||inBucket?'added':'')+'" data-id="'+item.id+'" data-type="'+item.media_type+'">';
          html+=p?'<img class="result-poster" src="'+p+'" />':'<div class="result-poster" style="display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:14px">\uD83C\uDFAC</div>';
          html+='<div class="result-info"><div class="result-title">'+esc(t)+' '+(added?'<span style="color:var(--blue);font-size:10px">\u2713 In Library</span>':inBucket?'<span style="color:var(--tx3);font-size:10px">\u2713 In Queue</span>':'')+'</div>';
          html+='<div class="result-meta">'+y+(g?' \u00b7 '+g:'')+'</div>';
          if(item.vote_average>0)html+='<div class="result-meta">\u2605 '+item.vote_average.toFixed(1)+'</div>';
          html+='</div>';
          if(!added)html+='<button class="quick-add-btn" data-qid="'+item.id+'" data-qt="'+item.media_type+'">\uff0b Add</button>';
          else html+='<span class="result-badge '+(isMovie?'film-badge':'tv-badge')+'">'+(isMovie?'Film':'TV')+'</span>';
          html+='</div>';
          return html;
        }).join('');
        $$('.quick-add-btn',addRes).forEach(btn=>{btn.onclick=async(ev)=>{
          ev.stopPropagation();btn.disabled=true;btn.textContent='...';
          const detail=await tmDetail(btn.dataset.qt,parseInt(btn.dataset.qid));
          if(detail){openAddModal({...detail,media_type:btn.dataset.qt})}
          else{btn.textContent='Error';btn.disabled=false}
        }});
        $$('.result-item:not(.added)',addRes).forEach(ri=>{ri.onclick=(ev)=>{
          if(ev.target.closest('.quick-add-btn'))return;
          const id=ri.dataset.id,type=ri.dataset.type;
          tmDetail(type,parseInt(id)).then(d=>{if(d)openAddModal({...d,media_type:type})});
        }});
      },400);
    }}
    document.addEventListener('click',function h(e){if(!e.target.closest('#vrAddSearch')&&!e.target.closest('#vrAddResults')){if(addRes)addRes.style.display='none';document.removeEventListener('click',h)}});
    bindViewToggles(buildUI);
    if(vrResults.length)renderResults();
    // Infinite scroll via IntersectionObserver
    setupScrollObserver();
  }

  let _autoDiscovered=false;
  let _loadingMore=false;
  let _noMoreResults=false;
  let _scrollObserver=null;

  function setupScrollObserver(){
    if(_scrollObserver)_scrollObserver.disconnect();
    const vrBox=$('#vrBox');
    if(!vrBox)return;
    _scrollObserver=new IntersectionObserver(function(entries){
      if(entries[0].isIntersecting&&!_loadingMore&&!_noMoreResults&&!vrLoading){
        vrPage+=3;S.vrPage=vrPage;
        discover(true);
      }
    },{root:vrBox,rootMargin:'200px'});
    const sentinel=$('#vrScrollSentinel');
    if(sentinel)_scrollObserver.observe(sentinel);
  }

  async function discover(append){
    if(!append){vrLoading=true;_noMoreResults=false}
    else{_loadingMore=true;var lm=$('#vrLoadMore');if(lm)lm.style.display='block'}
    const resEl=$('#vrResults');
    if(!append)resEl.innerHTML='<div style="text-align:center;padding:60px;color:var(--tx3);font-size:12px"><div class="vr-spinner"></div>Discovering...</div>';

    const mediaType=vrTab==='movies'?'movie':'tv';
    const existingIds=new Set([
      ...S.entries.filter(e=>e.media_type===mediaType).map(e=>String(e.tmdb_id)),
      ...S.bucket.filter(e=>e.media_type===mediaType).map(e=>String(e.tmdb_id))
    ]);
    const mood=moods.find(m=>m.id===activeMood);
    const moodGenres=mood?mood.genres:[];
    const genreFilter=activeGenre!=='all'?activeGenre:null;
    const searchQuery=S.vrSearch||'';
    const allResults=[];

    try{
      // Get genre ID map from TMDB
      const genreResp=await fetch(`https://api.themoviedb.org/3/genre/${mediaType}/list?api_key=${S.apiKey}`);
      const genreData=await genreResp.json();
      const genreMap={};(genreData.genres||[]).forEach(g=>genreMap[g.name]=g.id);

      if(searchQuery){
        // Keyword search mode — use TMDB search API
        const fetches=[];
        for(let i=0;i<2;i++){
          const pg=vrPage+i;
          fetches.push(fetch(`https://api.themoviedb.org/3/search/${mediaType}?api_key=${S.apiKey}&query=${encodeURIComponent(searchQuery)}&page=${pg}`).then(r=>r.json()).catch(()=>({results:[]})));
        }
        // Also try discover with keyword as text
        const kwResp=await fetch(`https://api.themoviedb.org/3/search/keyword?api_key=${S.apiKey}&query=${encodeURIComponent(searchQuery)}`);
        const kwData=await kwResp.json();
        const kwIds=(kwData.results||[]).slice(0,3).map(k=>k.id);
        if(kwIds.length){
          fetches.push(fetch(`https://api.themoviedb.org/3/discover/${mediaType}?api_key=${S.apiKey}&with_keywords=${kwIds.join('|')}&sort_by=popularity.desc&page=${vrPage}`).then(r=>r.json()).catch(()=>({results:[]})));
        }
        const pages=await Promise.all(fetches);
        pages.forEach(p=>{if(p.results)allResults.push(...p.results)});
      } else {
        // Genre/mood discover mode
        const targetGenres=genreFilter?[genreFilter]:(moodGenres.length?moodGenres:[]);
        const genreIds=targetGenres.map(g=>genreMap[g]).filter(Boolean);
        const genreParam=genreIds.length?`&with_genres=${genreIds.join('|')}`:'';

        const isGems=activeMood==='hidden-gems';
        const sortOptions=['popularity.desc','vote_average.desc','vote_count.desc','primary_release_date.desc'];
        const dateField=mediaType==='movie'?'primary_release_date':'first_air_date';
        let eraParam='';
        if(activeEra!=='all'){
          const yr=parseInt(activeEra);
          if(activeEra==='1950'){eraParam=`&${dateField}.lte=1959-12-31`}
          else{eraParam=`&${dateField}.gte=${yr}-01-01&${dateField}.lte=${yr+9}-12-31`}
        }

        const fetches=[];
        for(let i=0;i<3;i++){
          const pg=vrPage+i;
          const sort=isGems?'vote_average.desc':sortOptions[(vrPage+i)%sortOptions.length];
          const minVotes=isGems?10:(i===0?50:20);
          const minRating=isGems?7:(i===0?6:5);
          let url=`https://api.themoviedb.org/3/discover/${mediaType}?api_key=${S.apiKey}&sort_by=${sort}&vote_count.gte=${minVotes}&vote_average.gte=${minRating}&page=${pg}${genreParam}${eraParam}`;
          if(isGems)url+=`&vote_count.lte=300`;
          fetches.push(fetch(url).then(r=>r.json()).catch(()=>({results:[]})));
        }

        if(!activeMood&&!genreFilter&&activeEra==='all'){
          fetches.push(fetch(`https://api.themoviedb.org/3/trending/${mediaType}/week?api_key=${S.apiKey}`).then(r=>r.json()).catch(()=>({results:[]})));
        }

        const pages=await Promise.all(fetches);
        pages.forEach(p=>{if(p.results)allResults.push(...p.results)});
      }
    }catch(e){console.error('VRadar fetch error:',e)}

    const seen=new Set();
    if(append)vrResults.forEach(r=>seen.add(String(r.id)));
    const newItems=allResults.filter(r=>{
      const id=r.id.toString();
      if(seen.has(id)||existingIds.has(id))return false;
      if(activeEra!=='all'){const yr=parseInt((r.release_date||r.first_air_date||'').slice(0,4));
        if(!yr)return false;const eyr=parseInt(activeEra);
        if(activeEra==='1950'){if(yr>1959)return false}else{if(yr<eyr||yr>eyr+9)return false}}
      seen.add(id);return true;
    }).map(r=>({
      id:r.id,title:r.title||r.name||'',
      year:(r.release_date||r.first_air_date||'').slice(0,4),
      poster:r.poster_path,overview:r.overview||'',
      vote:r.vote_average||0,votes:r.vote_count||0,
      genres:r.genre_ids||[],media_type:mediaType
    })).sort((a,b)=>b.vote-a.vote).slice(0,24);

    if(append){
      vrResults=vrResults.concat(newItems);
      if(!newItems.length)_noMoreResults=true;
    } else {
      vrResults=newItems;
    }
    S.vrResults=vrResults;
    vrLoading=false;_loadingMore=false;
    var lm2=$('#vrLoadMore');if(lm2)lm2.style.display='none';
    renderResults(append);
  }

  function vrCardHTML(r,i,accent){
    return`<div class="vr-card fade-up" style="animation-delay:${Math.min(i*.04,.6)}s" data-tmdb="${r.id}">
          ${r.poster?`<img src="${TMDB_IMG}w342${r.poster}" alt="${esc(r.title)}" loading="lazy" />`
            :`<div class="vr-no-poster">\uD83C\uDFAC</div>`}
          <div class="vr-score" style="background:var(--${accent})">${r.vote.toFixed(1)}</div>
          <div class="vr-over">
            <h4>${esc(r.title)}</h4>
            <div style="font-size:10px;color:var(--tx3);margin:4px 0">${r.year}</div>
            <p style="font-size:10px;color:var(--tx2);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${esc(r.overview)}</p>
            <div style="display:flex;gap:6px">
              <button class="vr-add-btn" data-tmdb="${r.id}" style="background:var(--${accent});flex:1"><span style="display:block;font-size:13px;line-height:1">+</span>Add</button>
              <button class="vr-add-btn vr-bucket-btn" data-tmdb="${r.id}" style="background:var(--grn);flex:1"><span style="display:block;font-size:13px;line-height:1">+</span>Watch</button>
            </div>
          </div>
          <div class="card-preview">
            <div class="cp-title">${esc(r.title)}</div>
            <div class="cp-meta"><span class="cp-rating">${r.vote.toFixed(1)}/10</span><span>${r.year||''}</span></div>
            <div class="cp-genres">${(r.genres||[]).map(id=>GENRES[id]).filter(Boolean).join(' \u00b7 ')}</div>
            ${r.overview?`<div class="cp-overview">${esc(r.overview)}</div>`:''}
          </div>
        </div>`;
  }

  function renderResults(append){
    const resEl=$('#vrResults');
    if(!vrResults.length){resEl.innerHTML='<div style="text-align:center;padding:60px;color:var(--tx3);font-size:12px">No results found. Try different filters or add more titles to your library.</div>';return}
    const accent=vrTab==='movies'?'blue':'violet';

    if(append){
      // Append new cards to existing grid
      const grid=resEl.querySelector('.vr-grid');
      const cnt=resEl.querySelector('.vr-count');
      if(grid){
        const startIdx=grid.children.length;
        const newCards=vrResults.slice(startIdx);
        newCards.forEach((r,i)=>{
          const div=document.createElement('div');
          div.innerHTML=vrCardHTML(r,startIdx+i,accent);
          const card=div.firstElementChild;
          grid.appendChild(card);
        });
        if(cnt)cnt.textContent=vrResults.length;
      }
      // Reset load more button
      const loadBtn=$('#vrLoadBtn');
      if(loadBtn){loadBtn.innerHTML='<span style="display:inline-block;transition:transform .3s">\u21BB</span> Load More';loadBtn.disabled=false}
      setupScrollObserver();
    } else {
      resEl.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--tx3);font-weight:600">
            <span class="vr-count">${vrResults.length}</span> Discoveries
          </div>
        </div>
        <div class="vr-grid ${viewClass()}">${vrResults.map((r,i)=>vrCardHTML(r,i,accent)).join('')}
        </div>
        <div id="vrScrollSentinel" style="height:1px"></div>
        <div style="text-align:center;padding:20px 0 8px">
          <button class="btn-outline" id="vrLoadBtn" style="display:inline-flex;align-items:center;gap:6px;padding:10px 24px">
            <span style="display:inline-block;transition:transform .3s">\u21BB</span> Load More
          </button>
        </div>`;
      const loadBtn=$('#vrLoadBtn');
      if(loadBtn)loadBtn.onclick=()=>{
        vrPage+=3;S.vrPage=vrPage;
        loadBtn.querySelector('span').style.transform='rotate('+vrPage*120+'deg)';
        loadBtn.textContent='Loading...';loadBtn.disabled=true;
        discover(true);
      };
      setupScrollObserver();
    }

    function removeCard(tmdbId){
      const card=document.querySelector(`.vr-card[data-tmdb="${tmdbId}"]`);
      if(card){card.style.transition='all .3s';card.style.opacity='0';card.style.transform='scale(.9)';
        setTimeout(()=>card.remove(),300)}
      vrResults=vrResults.filter(r=>String(r.id)!==String(tmdbId));S.vrResults=vrResults;
    }

    // Use event delegation on the results container for all card interactions
    resEl.onclick=async function(ev){
      const card=ev.target.closest('.vr-card');if(!card)return;
      const tmdbId=card.dataset.tmdb;
      const mediaType=vrTab==='movies'?'movie':'tv';
      const addBtn=ev.target.closest('.vr-add-btn');
      if(addBtn){
        ev.stopPropagation();
        if(addBtn.classList.contains('vr-bucket-btn')){
          // Add to watchlist
          if(S.bucket.find(e=>String(e.tmdb_id)===String(tmdbId))){toast('Already in Watchlist');return}
          if(S.entries.find(e=>String(e.tmdb_id)===String(tmdbId))){toast('Already in library');return}
          addBtn.disabled=true;addBtn.textContent='...';
          try{
            const resp=await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}?api_key=${S.apiKey}&append_to_response=external_ids`);
            const d=await resp.json();
            const t=d.title||d.name,y=(d.release_date||d.first_air_date||'').slice(0,4);
            S.bucket.push({
              id:`bucket_${d.id}_${Date.now()}`,tmdb_id:d.id,media_type:mediaType,
              title:t,year:y,genres:(d.genres||[]).map(g=>g.name),poster:d.poster_path||'',
              overview:d.overview||'',tmdbRating:d.vote_average||0,
              runtime:d.runtime||(d.episode_run_time&&d.episode_run_time[0])||0,
              seasons:d.number_of_seasons||0,episodes:d.number_of_episodes||0,
              imdbId:d.external_ids?.imdb_id||'',addedAt:new Date().toISOString()
            });ps();removeCard(tmdbId);toast(`Added "${t}" to Watchlist`);
          }catch(e){addBtn.textContent='Error';addBtn.disabled=false}
        } else {
          // Add to library
          if(S.entries.find(e=>String(e.tmdb_id)===String(tmdbId))){toast('Already in library');return}
          try{
            const resp=await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}?api_key=${S.apiKey}&append_to_response=external_ids`);
            const d=await resp.json();S._vrRemoveId=tmdbId;
            openAddModal({...d,media_type:mediaType});
          }catch(e){toast('Failed to load details')}
        }
        return;
      }
      // Click card — open explore panel
      const r=vrResults.find(x=>String(x.id)===String(tmdbId));if(!r)return;
      openExplorePanel(r,mediaType,removeCard);
    };
  }

  buildUI();
  if(!_autoDiscovered&&!vrResults.length){_autoDiscovered=true;discover()}
}

// ═══ BUCKET LIST ═══
function renderBucket(el){
  const bucketMovies=S.bucket.filter(e=>e.media_type==='movie');
  const bucketTV=S.bucket.filter(e=>e.media_type==='tv');
  const rewatchItems=S.entries.filter(e=>e.rewatch);
  let bTab=S.bucketTab||'movies';
  let bGenre='all',bMood='all',bMinRating=7,bSearch='';

  const bucketMoods=[
    {id:'all',label:'All',icon:'🎬'},
    {id:'feel-good',label:'Feel Good',icon:'😊',genres:['Comedy','Romance','Family','Animation','Music']},
    {id:'mind-bender',label:'Mind Bender',icon:'🧠',genres:['Science Fiction','Thriller','Mystery','Drama']},
    {id:'edge-seat',label:'Edge of Seat',icon:'😰',genres:['Thriller','Horror','Action','Crime','Mystery']},
    {id:'epic',label:'Epic Journey',icon:'⚔️',genres:['Adventure','Fantasy','History','War','Science Fiction']},
    {id:'real-stories',label:'Real Stories',icon:'📖',genres:['Documentary','Drama','History']},
    {id:'wild-ride',label:'Wild Ride',icon:'🎢',genres:['Action','Adventure','Science Fiction','Crime']},
    {id:'dark-gritty',label:'Dark & Gritty',icon:'🌑',genres:['Crime','Drama','Thriller','Horror','War']}
  ];

  function buildUI(){
    const isRewatch=bTab==='rewatch';
    const rawItems=isRewatch?rewatchItems:(bTab==='movies'?bucketMovies:bucketTV);
    const accent=isRewatch?'blue':(bTab==='movies'?'blue':'violet');
    el.innerHTML=`
    <div class="fade-up">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;margin-bottom:12px;flex-shrink:0">
        <div>
          <h2 class="grad-title" style="font-size:32px">Watchlist</h2>
          <p style="color:var(--tx2);font-size:12px;margin-top:4px">${S.bucket.length} title${S.bucket.length!==1?'s':''} to watch${rewatchItems.length?' · '+rewatchItems.length+' to rewatch':''}</p>
        </div>
      </div>

      <div class="lib-tabs" style="margin-bottom:12px;flex-shrink:0">
        <div class="lib-tabs-boxed">
          <button class="lib-tab b-tab ${bTab==='movies'?'active-movie':''}" data-bt="movies">
            <span class="tab-icon">\uD83C\uDFAC</span>Movies<span class="tab-count">${bucketMovies.length}</span>
          </button>
          <button class="lib-tab b-tab ${bTab==='tv'?'active-tv':''}" data-bt="tv">
            <span class="tab-icon">\uD83D\uDCFA</span>TV Shows<span class="tab-count">${bucketTV.length}</span>
          </button>
          <button class="lib-tab b-tab ${bTab==='rewatch'?'active-movie':''}" data-bt="rewatch">
            <span class="tab-icon">\uD83D\uDD01</span>Rewatch<span class="tab-count">${rewatchItems.length}</span>
          </button>
        </div>
      </div>

      ${isRewatch?'':`${pillRow('Genre',[{id:'all',label:'All'},...MAJOR_GENRES.map(g=>({id:g,label:g}))],bGenre,'bgenre',accent)}
      ${pillRow('Mood',bucketMoods.map(m=>({id:m.id,label:m.label,icon:m.icon})),bMood,'bmood',accent)}`}
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0">
        <div style="position:relative;flex:1;min-width:140px"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px;pointer-events:none">🔍</span><input type="text" id="bFilter" placeholder="Search ${isRewatch?'rewatch list':'collection'}..." autocomplete="off" value="${esc(bSearch)}" style="width:100%;padding:8px 14px 8px 32px;font-size:11px;background:var(--bg3);border-radius:10px" /></div>
        ${isRewatch?'':`<div style="position:relative;flex:1;min-width:140px"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--${accent});font-size:13px;pointer-events:none">＋</span><input type="text" id="bAdd" placeholder="Add to watchlist..." autocomplete="off" style="width:100%;padding:8px 14px 8px 32px;font-size:11px;background:var(--bg3);border-radius:10px;border-color:var(--${accent})" /><div id="bsr" class="results" style="display:none"></div></div>`}
        ${isRewatch?'':pillRow('Rating',[{id:'0',label:'Any'},{id:'6',label:'6+'},{id:'7',label:'7+'},{id:'8',label:'8+'},{id:'9',label:'9+'}],String(bMinRating),'brating',accent,true)}
        <div style="margin-left:auto;display:flex;align-items:center;gap:10px"><span style="font-size:11px;color:var(--tx3)">${rawItems.length} titles</span>${viewToggles()}</div>
      </div>

      <div class="tv-glow"><div class="scroll-box-wrap"><div class="scroll-box" id="bucketScrollBox">
        <div id="bucketGridWrap"></div>
      </div></div></div>
    </div>`;

    function renderBucketGrid(){
      const wrap=$('#bucketGridWrap');if(!wrap)return;
      const isRew=bTab==='rewatch';
      const rawItems=isRew?rewatchItems:(bTab==='movies'?bucketMovies:bucketTV);
      const items=rawItems.filter(e=>{
        if(!isRew&&bGenre!=='all'&&!(e.genres||[]).includes(bGenre))return false;
        if(!isRew&&bMood!=='all'){const m=bucketMoods.find(x=>x.id===bMood);if(m&&m.genres&&!(e.genres||[]).some(g=>m.genres.includes(g)))return false}
        if(!isRew&&bMinRating>0&&(e.tmdbRating||0)<bMinRating)return false;
        if(bSearch&&!e.title.toLowerCase().includes(bSearch.toLowerCase()))return false;
        return true;
      });
      const accent=isRew?'blue':(bTab==='movies'?'blue':'violet');
      if(isRew){
        wrap.innerHTML=items.length?`<div class="bucket-grid ${viewClass()}">${items.map((e,i)=>`
          <div class="bucket-card fade-up" style="animation-delay:${Math.min(i*.04,.5)}s">
            ${e.poster?`<img class="bucket-poster" src="${TMDB_IMG}w185${e.poster}" alt="${esc(e.title)}" />`
              :`<div class="bucket-poster" style="display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:20px">\uD83C\uDFAC</div>`}
            <div class="bucket-info">
              <div class="bucket-title">${esc(e.title)}</div>
              <div class="bucket-meta">${e.year||''} · ${(e.genres||[]).slice(0,3).join(', ')} · <span style="background:linear-gradient(90deg,var(--blue-l),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:600">${e.myRating}/10</span></div>
              <div class="bucket-actions">
                <button class="bucket-watch rew-open" data-rid="${e.id}" style="background:var(--${accent})">Open Details</button>
                <button class="bucket-remove rew-remove" data-rid="${e.id}" title="Remove from rewatch">\u00d7</button>
              </div>
            </div>
            <div class="card-preview">
              <div class="cp-title">${esc(e.title)}</div>
              <div class="cp-meta"><span class="cp-rating">${e.myRating}/10</span>${e.tmdbRating>0?`<span style="color:var(--tx3);font-family:'JetBrains Mono',monospace;font-size:11px">\u2605 ${e.tmdbRating.toFixed(1)} TMDB</span>`:''}<span>${e.year||''}</span></div>
              <div class="cp-genres">${(e.genres||[]).slice(0,5).join(' · ')}</div>
              ${e.overview?`<div class="cp-overview">${esc(e.overview)}</div>`:''}
              ${e.tags&&e.tags.length?`<div class="cp-tags">${e.tags.slice(0,5).map(t=>`<span class="cp-tag">${esc(t)}</span>`).join('')}</div>`:''}
            </div>
          </div>`).join('')}</div>`
          :`<div style="text-align:center;padding:60px;color:var(--tx3);font-size:12px">
            ${rewatchItems.length?'No matches.':'Mark titles as Rewatch from your Library to see them here.'}
          </div>`;
        $$('.rew-open',wrap).forEach(btn=>btn.onclick=()=>{
          const en=S.entries.find(e=>e.id===btn.dataset.rid);if(en)openDetail(en);
        });
        $$('.rew-remove',wrap).forEach(btn=>btn.onclick=()=>{
          const en=S.entries.find(e=>e.id===btn.dataset.rid);
          if(en){en.rewatch=false;ps();renderBucket(el);toast(`Removed "${en.title}" from rewatch`)}
        });
      } else {
      wrap.innerHTML=items.length?`<div class="bucket-grid ${viewClass()}">${items.map((e,i)=>`
        <div class="bucket-card fade-up" style="animation-delay:${Math.min(i*.04,.5)}s">
          ${e.poster?`<img class="bucket-poster" src="${TMDB_IMG}w185${e.poster}" alt="${esc(e.title)}" />`
            :`<div class="bucket-poster" style="display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:20px">\uD83C\uDFAC</div>`}
          <div class="bucket-info">
            <div class="bucket-title">${esc(e.title)}</div>
            <div class="bucket-meta">${e.year||''} · ${(e.genres||[]).slice(0,3).join(', ')}${e.tmdbRating>0?' · \u2605 '+e.tmdbRating.toFixed(1):''}</div>
            <div class="bucket-actions">
              <button class="bucket-watch" data-bid="${e.id}" style="background:var(--${accent})">Watched — Add to Library</button>
              <button class="bucket-remove" data-bid="${e.id}">\u00d7</button>
            </div>
          </div>
          <div class="card-preview">
            <div class="cp-title">${esc(e.title)}</div>
            <div class="cp-meta"><span class="cp-rating">${e.tmdbRating>0?e.tmdbRating.toFixed(1)+'/10':''}</span><span>${e.year||''}</span>${e.runtime?`<span>${e.runtime} min</span>`:''}</div>
            <div class="cp-genres">${(e.genres||[]).slice(0,5).join(' · ')}</div>
            ${e.overview?`<div class="cp-overview">${esc(e.overview)}</div>`:''}
          </div>
        </div>`).join('')}</div>`:
        `<div style="text-align:center;padding:60px;color:var(--tx3);font-size:12px">
          ${rawItems.length?'No matches — try adjusting filters or search TMDB above to add.':'Search above to add titles to your watchlist.'}
        </div>`;
      // Watched button
      $$('.bucket-watch',wrap).forEach(btn=>btn.onclick=async()=>{
        const item=S.bucket.find(e=>e.id===btn.dataset.bid);if(!item)return;
        btn.textContent='Loading...';btn.disabled=true;
        const detail=await tmDetail(item.media_type,parseInt(item.tmdb_id));
        if(!detail){btn.textContent='Watched — Add to Library';btn.disabled=false;toast('Failed to load');return}
        S._bucketRemoveId=item.id;
        openAddModal({...detail,media_type:item.media_type});
      });
      // Remove button
      $$('.bucket-remove',wrap).forEach(btn=>btn.onclick=()=>{
        const item=S.bucket.find(e=>e.id===btn.dataset.bid);
        if(item&&confirm(`Remove "${item.title}" from queue?`)){
          S.bucket=S.bucket.filter(e=>e.id!==item.id);ps();
          renderBucket(el);toast(`Removed "${item.title}"`);
        }
      });
      }
    }
    renderBucketGrid();

    // Search collection filter
    const bfInp=$('#bFilter');
    if(bfInp){bfInp.oninput=()=>{
      bSearch=bfInp.value.trim();
      renderBucketGrid();
    }}
    // Search TMDB to add
    let bst=null;
    const bAddInp=$('#bAdd'),bRes=$('#bsr');
    if(bAddInp){bAddInp.oninput=()=>{
      clearTimeout(bst);
      const q=bAddInp.value.trim();
      if(q.length<2){if(bRes)bRes.style.display='none';return}
      bst=setTimeout(async()=>{const r=await tmSearch(q);if($('#bsr'))showBucketResults($('#bsr'),r)},400);
    }}
    document.addEventListener('click',function h(e){if(!e.target.closest('#bAdd')&&!e.target.closest('#bsr')){if(bRes)bRes.style.display='none';document.removeEventListener('click',h)}});

    // Tab switching
    $$('.b-tab').forEach(t=>t.onclick=()=>{
      bTab=t.dataset.bt;S.bucketTab=bTab;bGenre='all';bMood='all';bMinRating=7;buildUI();
    });

    // Pill filters
    $$('[data-bmood]').forEach(b=>b.onclick=()=>{bMood=b.dataset.bmood;buildUI()});
    $$('[data-bgenre]').forEach(b=>b.onclick=()=>{bGenre=b.dataset.bgenre;buildUI()});
    $$('[data-brating]').forEach(b=>b.onclick=()=>{bMinRating=parseFloat(b.dataset.brating);buildUI()});
    bindViewToggles(buildUI);
  }

  function showBucketResults(c,results){
    if(!results.length){c.style.display='none';return}c.style.display='block';
    c.innerHTML=results.map(item=>{
      const t=item.title||item.name,y=(item.release_date||item.first_air_date||'').slice(0,4);
      const p=item.poster_path?`${TMDB_IMG}w92${item.poster_path}`:'';
      const g=(item.genre_ids||[]).slice(0,3).map(id=>GENRES[id]).filter(Boolean).join(', ');
      const inBucket=S.bucket.some(e=>e.tmdb_id===item.id);
      const inLib=S.entries.some(e=>e.tmdb_id===item.id);
      const isMovie=item.media_type==='movie';
      return`<div class="result-item ${inBucket||inLib?'added':''}" data-id="${item.id}" data-type="${item.media_type}">
        ${p?`<img class="result-poster" src="${p}" />`:`<div class="result-poster" style="display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:14px">\uD83C\uDFAC</div>`}
        <div class="result-info"><div class="result-title">${esc(t)} ${inLib?'<span style="color:var(--blue);font-size:10px">\u2713 In Library</span>':inBucket?'<span style="color:var(--tx3);font-size:10px">\u2713 In Queue</span>':''}</div>
          <div class="result-meta">${y}${g?' \u00b7 '+g:''}</div>
          ${item.vote_average>0?`<div class="result-meta">\u2605 ${item.vote_average.toFixed(1)}</div>`:''}</div>
        ${!inBucket&&!inLib?`<button class="quick-add-btn" data-qid="${item.id}" data-qt="${item.media_type}">\uff0b Queue</button>`
          :`<span class="result-badge ${isMovie?'film-badge':'tv-badge'}">${isMovie?'Film':'TV'}</span>`}
      </div>`}).join('');

    $$('.quick-add-btn',c).forEach(btn=>{btn.onclick=async(ev)=>{
      ev.stopPropagation();btn.disabled=true;btn.textContent='...';
      const detail=await tmDetail(btn.dataset.qt,parseInt(btn.dataset.qid));
      if(detail){
        const t=detail.title||detail.name,y=(detail.release_date||detail.first_air_date||'').slice(0,4);
        S.bucket.push({
          id:`bucket_${detail.id}_${Date.now()}`,tmdb_id:detail.id,media_type:btn.dataset.qt,
          title:t,year:y,genres:(detail.genres||[]).map(g=>g.name),poster:detail.poster_path||'',
          overview:detail.overview||'',tmdbRating:detail.vote_average||0,
          runtime:detail.runtime||(detail.episode_run_time&&detail.episode_run_time[0])||0,
          seasons:detail.number_of_seasons||0,episodes:detail.number_of_episodes||0,
          imdbId:detail.external_ids?.imdb_id||'',addedAt:new Date().toISOString()
        });ps();toast(`\u2713 Added "${t}" to queue`);
        btn.textContent='\u2713 Added';btn.classList.add('quick-added');
        renderBucket(el);
      }else{btn.textContent='Error';btn.disabled=false}
    }});
  }

  buildUI();
}

// ═══ VRCOMMEND (Recommend from library) ═══
function renderVRcommend(el){
  if(!S.entries.length){el.innerHTML=`<div class="empty fade-up"><div class="icon">🎯</div><h3>Build Your Library First</h3>
    <p>Add movies and shows to your library to start recommending.</p>
    <button class="btn" style="max-width:240px;margin:24px auto 0" onclick="document.querySelector('[data-tab=vradar]').click()">Start Adding</button></div>`;return}

  const movies=S.entries.filter(e=>e.media_type==='movie');
  const tvShows=S.entries.filter(e=>e.media_type==='tv');
  const allGenres=[...new Set(S.entries.flatMap(e=>e.genres||[]))].sort();
  const allTags=[...new Set(S.entries.flatMap(e=>e.tags||[]))].sort();

  let recTab=S.recTab||'movies';
  let recGenre=S.recGenre||'all';
  let recMood=S.recMood||'all';
  let recMinRating=S.recMinRating||7;
  let recTag='all';
  let recSearch='';

  const moodFilters=[
    {id:'all',label:'Any Mood'},
    {id:'feel-good',label:'Feel Good',tags:['Comfort Watch','Feel Good','Date Night'],genres:['Comedy','Romance','Family','Animation']},
    {id:'intense',label:'Intense',tags:['Mind-Bending','Edge of Seat'],genres:['Thriller','Horror','Crime','Action']},
    {id:'epic',label:'Epic',tags:['Masterpiece','Visually Stunning','Must Watch'],genres:['Adventure','Fantasy','History','War']},
    {id:'chill',label:'Chill Night',tags:['Comfort Watch','Binge-Worthy','Guilty Pleasure'],genres:['Comedy','Drama','Romance']},
    {id:'underrated',label:'Hidden Finds',tags:['Hidden Gem','Underrated'],genres:[]}
  ];

  function getFiltered(){
    const items=(recTab==='movies'?movies:tvShows).filter(e=>e.myRating>=recMinRating);
    let filtered=items;
    if(recGenre!=='all')filtered=filtered.filter(e=>(e.genres||[]).includes(recGenre));
    if(recTag!=='all')filtered=filtered.filter(e=>(e.tags||[]).includes(recTag));
    if(recMood!=='all'){
      const mood=moodFilters.find(m=>m.id===recMood);
      if(mood){
        filtered=filtered.filter(e=>{
          const hasTag=(e.tags||[]).some(t=>(mood.tags||[]).includes(t));
          const hasGenre=(e.genres||[]).some(g=>(mood.genres||[]).includes(g));
          return hasTag||hasGenre;
        });
      }
    }
    if(recSearch)filtered=filtered.filter(e=>e.title.toLowerCase().includes(recSearch.toLowerCase()));
    return filtered.sort((a,b)=>b.myRating-a.myRating);
  }

  function buildUI(){
    const filtered=getFiltered();
    const accent=recTab==='movies'?'blue':'violet';
    el.innerHTML=`
    <div class="fade-up">
      <div style="margin-bottom:14px;flex-shrink:0">
        <h2 class="grad-title" style="font-size:36px">Recommend</h2>
        <p style="color:var(--tx2);font-size:12px;margin-top:4px">Your curated picks — share what you'd recommend to friends</p>
      </div>

      <div class="lib-tabs" style="margin-bottom:12px;flex-shrink:0">
        <div class="lib-tabs-boxed">
          <button class="lib-tab rec-tab ${recTab==='movies'?'active-movie':''}" data-rec="movies">
            <span class="tab-icon">🎬</span>Movies<span class="tab-count">${movies.length}</span>
          </button>
          <button class="lib-tab rec-tab ${recTab==='tv'?'active-tv':''}" data-rec="tv">
            <span class="tab-icon">📺</span>TV Shows<span class="tab-count">${tvShows.length}</span>
          </button>
        </div>
      </div>

      ${pillRow('Genre',[{id:'all',label:'All'},...MAJOR_GENRES.map(g=>({id:g,label:g}))],recGenre,'rgenre',accent)}
      ${pillRow('Mood',moodFilters.map(m=>({id:m.id,label:m.label})),recMood,'rmood',accent)}
      ${allTags.length?pillRow('Tags',[{id:'all',label:'All'},...allTags.sort().slice(0,8).map(t=>({id:t,label:t}))],recTag,'rtag',accent):''}
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0">
        <div style="position:relative;flex:1;min-width:180px"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px;pointer-events:none">🔍</span><input type="text" id="recSearch" placeholder="Search recommendations..." value="${esc(recSearch)}" style="width:100%;padding:8px 14px 8px 32px;font-size:11px;background:var(--bg3);border-radius:10px" /></div>
        ${pillRow('Rating',[{id:'5',label:'5+'},{id:'6',label:'6+'},{id:'7',label:'7+'},{id:'8',label:'8+'},{id:'9',label:'9+'}],String(recMinRating),'rrating',accent,true)}
        <div style="margin-left:auto;display:flex;align-items:center;gap:10px"><span class="rec-count" style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--tx3);font-weight:600">${filtered.length}</span>${viewToggles()}</div>
      </div>

      <div class="tv-glow"><div class="scroll-box-wrap"><div class="scroll-box">
        <div id="recGridWrap"></div>
      </div></div></div>
    </div>`;

    function renderRecGrid(){
      const filtered=getFiltered();
      const accent=recTab==='movies'?'blue':'violet';
      const wrap=$('#recGridWrap');if(!wrap)return;
      const cnt=$('.rec-count');if(cnt)cnt.textContent=filtered.length;
      wrap.innerHTML=filtered.length?`<div class="vr-grid ${viewClass()}">${filtered.map((e,i)=>`
        <div class="vr-card fade-up" style="animation-delay:${Math.min(i*.04,.6)}s" data-idx="${e.id}">
          ${e.poster?`<img src="${TMDB_IMG}w342${e.poster}" alt="${esc(e.title)}" loading="lazy" />`
            :`<div class="vr-no-poster">🎬</div>`}
          <div class="vr-over">
            <h4>${esc(e.title)}</h4>
            <div style="font-size:10px;color:var(--tx3);margin:4px 0">${e.year||''} · ${(e.genres||[]).slice(0,2).join(', ')}</div>
            ${e.tags&&e.tags.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${e.tags.slice(0,3).map(t=>`<span style="font-size:8px;padding:2px 8px;border-radius:10px;background:var(--${accent}-g);color:var(--${accent}-l);letter-spacing:.3px">${esc(t)}</span>`).join('')}</div>`:''}
            ${e.overview?`<p style="font-size:10px;color:var(--tx2);line-height:1.5;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(e.overview)}</p>`:''}
          </div>
          <div class="card-preview">
            <div class="cp-title">${esc(e.title)}</div>
            <div class="cp-meta"><span class="cp-rating">${e.myRating}/10</span>${e.tmdbRating>0?`<span style="color:var(--tx3);font-family:'JetBrains Mono',monospace;font-size:11px">\u2605 ${e.tmdbRating.toFixed(1)} TMDB</span>`:''}<span>${e.year||''}</span>${e.runtime?`<span>${e.runtime} min</span>`:''}</div>
            <div class="cp-genres">${(e.genres||[]).join(' \u00b7 ')}</div>
            ${e.overview?`<div class="cp-overview">${esc(e.overview)}</div>`:''}
            ${e.tags&&e.tags.length?`<div class="cp-tags">${e.tags.slice(0,5).map(t=>`<span class="cp-tag">${esc(t)}</span>`).join('')}</div>`:''}
          </div>
        </div>`).join('')}
      </div>`:`<div style="text-align:center;padding:60px;color:var(--tx3);font-size:12px">No matches. Try adjusting your filters or lowering the minimum rating.</div>`;
      $$('.vr-card',wrap).forEach(c=>{c.onclick=()=>{const en=S.entries.find(e=>e.id===c.dataset.idx);if(en)openDetail(en)}});
    }
    renderRecGrid();

    $$('.rec-tab').forEach(t=>t.onclick=()=>{
      recTab=t.dataset.rec;S.recTab=recTab;buildUI();
    });
    $$('[data-rgenre]').forEach(b=>b.onclick=()=>{recGenre=b.dataset.rgenre;S.recGenre=recGenre;buildUI()});
    $$('[data-rtag]').forEach(b=>b.onclick=()=>{recTag=b.dataset.rtag;buildUI()});
    $$('[data-rmood]').forEach(b=>b.onclick=()=>{recMood=b.dataset.rmood;S.recMood=recMood;buildUI()});
    $$('[data-rrating]').forEach(b=>b.onclick=()=>{recMinRating=parseInt(b.dataset.rrating);S.recMinRating=recMinRating;buildUI()});
    if($('#recSearch'))$('#recSearch').oninput=()=>{recSearch=$('#recSearch').value.trim();renderRecGrid()};

// ═══ MY PICKS ═══
function renderPicks(el){
  const recs=S.entries.filter(e=>e.recommended);
  if(!recs.length){
    el.innerHTML=`<div class="empty fade-up"><div class="icon">\u2B50</div><h3>No Favourites Yet</h3>
      <p>Open any title in your Library and toggle "Favourites" to start curating recommendations.</p>
      ${S.entries.length?`<button class="btn" style="max-width:240px;margin:24px auto 0" onclick="document.querySelector('[data-tab=library]').click()">Go to Library</button>`:''}</div>`;return}

  const movies=recs.filter(e=>e.media_type==='movie');
  const tvShows=recs.filter(e=>e.media_type==='tv');
  const allTags=[...new Set(recs.flatMap(e=>e.tags||[]))].sort();
  let pTab=S._picksTab||'movies';
  let pGenre=S._picksGenre||'all';
  let pMood=S._picksMood||'all';
  let pTag=S._picksTag||'all';
  let pSearch='';

  const pickMoods=[
    {id:'all',label:'Any Mood'},
    {id:'feel-good',label:'Feel Good',genres:['Comedy','Romance','Family','Animation']},
    {id:'intense',label:'Intense',genres:['Thriller','Horror','Crime','Action']},
    {id:'epic',label:'Epic',genres:['Adventure','Fantasy','History','War']},
    {id:'chill',label:'Chill Night',genres:['Comedy','Drama','Romance']},
    {id:'dark-gritty',label:'Dark & Gritty',genres:['Crime','Drama','Thriller','Horror','War']}
  ];

  function getFiltered(){
    const items=pTab==='movies'?movies:tvShows;
    let filtered=items;
    if(pGenre!=='all')filtered=filtered.filter(e=>(e.genres||[]).includes(pGenre));
    if(pMood!=='all'){const mood=pickMoods.find(m=>m.id===pMood);if(mood&&mood.genres)filtered=filtered.filter(e=>(e.genres||[]).some(g=>mood.genres.includes(g)))}
    if(pTag!=='all')filtered=filtered.filter(e=>(e.tags||[]).includes(pTag));
    if(pSearch)filtered=filtered.filter(e=>e.title.toLowerCase().includes(pSearch.toLowerCase()));
    return filtered.sort((a,b)=>b.myRating-a.myRating);
  }

  function buildUI(){
    const filtered=getFiltered();
    const accent=pTab==='movies'?'blue':'violet';
    el.innerHTML=`
    <div class="fade-up">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;margin-bottom:12px;flex-shrink:0">
        <div><h2 class="grad-title" style="font-size:32px">Favourites</h2>
          <p style="color:var(--tx2);font-size:12px;margin-top:4px">${recs.length} favourite${recs.length!==1?'s':''} — ${movies.length} films · ${tvShows.length} shows</p></div>
        <div style="display:flex;gap:8px;align-items:center">
          ${viewToggles()}
          <button class="btn btn-sm" id="shareBtn">\uD83D\uDCE4 Share</button>
        </div>
      </div>

      <div class="lib-tabs" style="margin-bottom:12px;flex-shrink:0">
        <div class="lib-tabs-boxed">
          <button class="lib-tab p-tab ${pTab==='movies'?'active-movie':''}" data-pt="movies">
            <span class="tab-icon">\uD83C\uDFAC</span>Movies<span class="tab-count">${movies.length}</span>
          </button>
          <button class="lib-tab p-tab ${pTab==='tv'?'active-tv':''}" data-pt="tv">
            <span class="tab-icon">\uD83D\uDCFA</span>TV Shows<span class="tab-count">${tvShows.length}</span>
          </button>
        </div>
      </div>

      ${pillRow('Genre',[{id:'all',label:'All'},...MAJOR_GENRES.map(g=>({id:g,label:g}))],pGenre,'pgenre',accent)}
      ${pillRow('Mood',pickMoods.map(m=>({id:m.id,label:m.label})),pMood,'pmood',accent)}
      ${allTags.length?pillRow('Tags',[{id:'all',label:'All'},...allTags.slice(0,10).map(t=>({id:t,label:t}))],pTag,'ptag',accent):''}
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0">
        <div style="position:relative;flex:1;min-width:180px"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px;pointer-events:none">🔍</span><input type="text" id="pSearch" placeholder="Search favourites..." value="${esc(pSearch)}" style="width:100%;padding:8px 14px 8px 32px;font-size:11px;background:var(--bg3);border-radius:10px" /></div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:10px"><span class="picks-count" style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--tx3);font-weight:600">${filtered.length}</span></div>
      </div>

      <div class="tv-glow"><div class="scroll-box-wrap"><div class="scroll-box">
        <div id="picksGridWrap"></div>
      </div></div></div>
    </div>`;

    function renderPicksGrid(){
      const filtered=getFiltered();
      const wrap=$('#picksGridWrap');if(!wrap)return;
      const cnt=document.querySelector('.picks-count');if(cnt)cnt.textContent=filtered.length;
      wrap.innerHTML=filtered.length?`<div class="picks-row ${viewClass()}">${filtered.map((e,i)=>pickCard(e,i)).join('')}</div>`
        :`<div style="text-align:center;padding:60px;color:var(--tx3);font-size:12px">No matches. Try adjusting your filters.</div>`;
      $$('.pick-card',wrap).forEach(c=>{c.onclick=()=>{const en=S.entries.find(e=>e.id===c.dataset.idx);if(en)openDetail(en)}});
    }
    renderPicksGrid();

    $$('.p-tab').forEach(t=>t.onclick=()=>{pTab=t.dataset.pt;S._picksTab=pTab;pGenre='all';S._picksGenre='all';pMood='all';S._picksMood='all';pTag='all';S._picksTag='all';buildUI()});
    $$('[data-pgenre]').forEach(b=>b.onclick=()=>{pGenre=b.dataset.pgenre;S._picksGenre=pGenre;buildUI()});
    $$('[data-pmood]').forEach(b=>b.onclick=()=>{pMood=b.dataset.pmood;S._picksMood=pMood;buildUI()});
    $$('[data-ptag]').forEach(b=>b.onclick=()=>{pTag=b.dataset.ptag;S._picksTag=pTag;buildUI()});
    let _pSt=null;
    if($('#pSearch'))$('#pSearch').oninput=()=>{clearTimeout(_pSt);_pSt=setTimeout(()=>{pSearch=$('#pSearch').value.trim();renderPicksGrid()},300)};
    bindViewToggles(buildUI);
    const genreMap={};recs.forEach(e=>(e.genres||[]).forEach(g=>{if(MAJOR_GENRES.includes(g)){if(!genreMap[g])genreMap[g]=[];genreMap[g].push(e)}}));
    Object.values(genreMap).forEach(arr=>arr.sort((a,b)=>b.myRating-a.myRating));
    const sortedGenres=Object.entries(genreMap).sort((a,b)=>b[1].length-a[1].length);
    const gems=recs.filter(e=>(e.tags||[]).includes('Hidden Gem'));
    if($('#shareBtn'))$('#shareBtn').onclick=()=>generateSharePage(recs,sortedGenres,gems);
  }

  buildUI();
}

function pickCard(e,i){
  const isGem=(e.tags||[]).includes('Hidden Gem');
  return`<div class="pick-card" data-idx="${e.id}">
    ${e.poster?`<img src="${TMDB_IMG}w300${e.poster}" alt="${esc(e.title)}" loading="lazy" />`
    :`<div style="width:155px;height:232px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px">\uD83C\uDFAC</div>`}
    ${isGem?'<span class="gem-badge">\uD83D\uDC8E</span>':''}
    <div class="pick-info"><div class="pick-title">${esc(e.title)}</div>
      <div class="pick-rating">${e.myRating}/10 ${e.year?`<span style="color:var(--tx3);font-weight:400">\u00b7 ${e.year}</span>`:''}</div></div>
    <div class="card-preview">
      <div class="cp-title">${esc(e.title)}</div>
      <div class="cp-meta"><span class="cp-rating">${e.myRating}/10</span>${e.tmdbRating>0?`<span style="color:var(--tx3);font-family:'JetBrains Mono',monospace;font-size:11px">\u2605 ${e.tmdbRating.toFixed(1)} TMDB</span>`:''}<span>${e.year||''}</span>${e.runtime?`<span>${e.runtime} min</span>`:''}</div>
      <div class="cp-genres">${(e.genres||[]).join(' \u00b7 ')}</div>
      ${e.overview?`<div class="cp-overview">${esc(e.overview)}</div>`:''}
      ${e.tags&&e.tags.length?`<div class="cp-tags">${e.tags.slice(0,5).map(t=>`<span class="cp-tag">${esc(t)}</span>`).join('')}</div>`:''}
    </div></div>`;
}

  }else{$('#c4').parentElement.innerHTML='<div style="color:var(--tx3);padding:40px;text-align:center;font-size:12px">Add more titles to unlock</div>'}
  if($('#statUnitToggle'))$('#statUnitToggle').onclick=()=>{
    S._statUnit=S._statUnit==='days'?'hours':'days';
    $('#statTimeVal').textContent=S._statUnit==='days'?days:hrs;
    $('#statUnitLabel').textContent=S._statUnit==='days'?'days':'hours';
  };
}

render();checkBackupReminder();

// ═══ GLOBAL HOVER TOOLTIP ═══
(function(){
  var tip=null,activeCard=null;
  function show(card){
    var src=card.querySelector('.card-preview');
    if(!src)return;
    hide();
    activeCard=card;
    tip=src.cloneNode(true);
    tip.style.display='block';
    document.body.appendChild(tip);
    var r=card.getBoundingClientRect();
    var h=tip.offsetHeight;
    var left=r.left+r.width/2-150;
    var top=r.top-h-6;
    var below=false;
    if(top<4){top=r.bottom+6;below=true}
    if(left<4)left=4;
    if(left+300>window.innerWidth-4)left=window.innerWidth-304;
    tip.style.left=left+'px';tip.style.top=top+'px';
    var arrow=document.createElement('div');
    arrow.className='cp-arrow '+(below?'arrow-up':'arrow-down');
    // Position arrow to point at card center
    var arrowLeft=r.left+r.width/2-left-6;
    if(arrowLeft<12)arrowLeft=12;if(arrowLeft>288)arrowLeft=288;
    arrow.style.left=arrowLeft+'px';arrow.style.transform='translateX(0) rotate(45deg)';
    tip.appendChild(arrow);
  }
  function hide(){
    if(tip&&tip.parentNode)tip.parentNode.removeChild(tip);
    tip=null;activeCard=null;
  }
  document.addEventListener('mouseover',function(e){
    var card=e.target.closest('.poster-card,.vr-card,.bucket-card,.pick-card');
    if(card&&card!==activeCard)show(card);
    else if(!card)hide();
  });
  document.addEventListener('mouseout',function(e){
    if(!e.relatedTarget||!e.relatedTarget.closest('.poster-card,.vr-card,.bucket-card,.pick-card'))hide();
  });
  document.addEventListener('scroll',hide,true);
})();

// ═══ SCROLL BOX ACTIVATION ═══
// Only enable inner scrolling once the box bottom is fully visible
(function(){
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      var box=en.target.querySelector('.scroll-box');
      if(!box)return;
      if(en.intersectionRatio>=0.95)box.classList.add('scroll-active');
      else box.classList.remove('scroll-active');
    });
  },{threshold:[0,0.95,1]});
  // Observe whenever DOM updates
  var watching=new Set();
  function scan(){
    document.querySelectorAll('.scroll-box-wrap').forEach(function(w){
      if(!watching.has(w)){watching.add(w);obs.observe(w)}
    });
    // Clean up removed elements
    watching.forEach(function(w){
      if(!document.contains(w)){obs.unobserve(w);watching.delete(w)}
    });
  }
  var mo=new MutationObserver(scan);
  mo.observe(document.body,{childList:true,subtree:true});
  scan();
})();

// TV Power Button — inject into each .tv-glow
(function(){
  var pwrSet=new Set();
  function injectPower(){
    document.querySelectorAll('.tv-glow').forEach(function(tv){
      if(pwrSet.has(tv))return;pwrSet.add(tv);
      // Add CRT overlay
      var overlay=document.createElement('div');
      overlay.className='tv-crt-overlay';
      tv.querySelector('.scroll-box-wrap').appendChild(overlay);
      // Add power button
      var btn=document.createElement('button');
      btn.className='tv-power-btn';
      btn.title='Power';
      tv.appendChild(btn);
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        var isOff=tv.classList.contains('tv-off');
        if(isOff){
          // Boot up — remove tv-off, start boot animation (overlay stays opaque via animation)
          tv.classList.remove('tv-off');
          overlay.className='tv-crt-overlay booting-up';
          overlay.addEventListener('animationend',function(){
            overlay.className='tv-crt-overlay';
          },{once:true});
        }else{
          // Shutdown
          overlay.className='tv-crt-overlay shutting-down';
          overlay.addEventListener('animationend',function(){
            tv.classList.add('tv-off');
            overlay.className='tv-crt-overlay';
          },{once:true});
        }
      });
    });
    // Clean up removed
    pwrSet.forEach(function(tv){if(!document.contains(tv))pwrSet.delete(tv)});
  }
  var pmo=new MutationObserver(injectPower);
  pmo.observe(document.body,{childList:true,subtree:true});
  injectPower();
})();
</script>
